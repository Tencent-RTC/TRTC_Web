<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <title>Enable Audio Mixer</title>
    <script src="../../util/i18n.js" defer></script>
    <script src="../../components/header.js" defer></script>
    <script src="../../components/params-form.js" defer></script>
    <script src="../../components/invite-section.js" defer></script>
    <script
      src="https://cdn-go.cn/aegis/aegis-sdk/latest/aegis.min.js"
      defer
    ></script>
    <script src="../../libs/lib-generate-test-usersig.min.js" defer></script>
    <script
      src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"
      defer
    ></script>
    <script src="../../libs/clipboard.min.js" defer></script>
    <script src="../../util/utils.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header-nav></header-nav>
    <main>
      <div class="feature-container">
        <h1 style="color: #1c66e5" data-i18n="audioMixer.title">Enable Audio Mixer</h1>
        <params-form></params-form>
        <section>
          <h3><span class="step-badge">2</span><span data-i18n="common.enterTheRoom">Enter the room</span></h3>
          <div class="btn-list">
            <button id="enter-btn" class="btn" onclick="enterRoom()">
              <span class="btn-text" data-i18n="common.enterRoom">Enter Room</span>
            </button>
            <button id="exit-btn" class="btn" onclick="exitRoom()" disabled>
              <span class="btn-text" data-i18n="common.exitRoom">Exit Room</span>
            </button>
          </div>
        </section>
        <section>
          <h3><span class="step-badge">3</span><span data-i18n="audioMixer.addBgm">Add background music during a call</span></h3>
          <div class="play-volume-container">
            <div class="play-control">
              <div class="loop-container">
                <input
                  type="checkbox"
                  id="loop"
                  class="plugin-option"
                  onchange="switchLoopStatus()"
                />
                <label for="loop" style="white-space: nowrap" data-i18n="audioMixer.loop">Loop</label>
              </div>
              <img
                id="play-icon"
                onclick="pauseOrResumeAudio()"
                src="https://web.sdk.qcloud.com/trtc/webrtc/v5/demo/samples/icons/pause.svg"
                alt="Start/Pause audio"
              />
            </div>
            <div class="volume-container">
              <input
                type="range"
                id="volume-input"
                class="plugin-option"
                onchange="setVolume()"
                min="0"
                max="1"
                value="1"
                step="0.1"
              />
              <label for="local-volume" data-i18n="audioMixer.volume">Volume:</label>
              <input id="volume-display" type="text" value="1" readonly />
            </div>
          </div>
          <div class="playtime-container">
            <label for="local-volume" data-i18n="audioMixer.playFromSecond">Play audio from given second</label>
            <input
              id="time-input"
              class="plugin-option"
              type="number"
              min="1"
              max="20"
              value="5"
            />
            <button
              id="play-btn"
              class="btn plugin-option"
              onclick="playFromSpecificSecond()"
              disabled
            >
              <span class="btn-text" data-i18n="audioMixer.play">Play</span>
            </button>
          </div>
          <div class="btn-list">
            <button
              id="start-mixer-btn"
              class="btn"
              onclick="startAudioMixer()"
            >
              <span class="btn-text" data-i18n="audioMixer.startMixer">Start Audio Mixer</span>
            </button>
            <button
              id="stop-mixer-btn"
              class="btn"
              onclick="stopAudioMixer()"
              disabled
            >
              <span class="btn-text" data-i18n="audioMixer.stopMixer">Stop Audio Mixer</span>
            </button>
          </div>
        </section>
        <invite-section id="invite-section-el"></invite-section>
      </div>
    </main>
  </body>
</html>
