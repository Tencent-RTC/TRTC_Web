<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <title>Enable Watermark</title>
    <script src="../../util/i18n.js" defer></script>
    <script src="../../components/header.js" defer></script>
    <script src="../../components/params-form.js" defer></script>
    <script src="../../components/invite-section.js" defer></script>
    <script src="../../components/video-views.js" defer></script>
    <script
      src="https://cdn-go.cn/aegis/aegis-sdk/latest/aegis.min.js"
      defer
    ></script>
    <script src="../../libs/lib-generate-test-usersig.min.js" defer></script>
    <script
      src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"
      defer
    ></script>
    <script
      src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/plugins/video-effect/watermark/watermark.iife.js"
      defer
    ></script>
    <script src="../../libs/clipboard.min.js" defer></script>
    <script src="../../util/utils.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header-nav></header-nav>
    <main>
      <div class="feature-container">
        <h1 style="color: #1c66e5" data-i18n="watermark.title">Enable Watermark</h1>
        <params-form></params-form>
        <section>
          <h3><span class="step-badge">2</span><span data-i18n="common.enterTheRoom">Enter the room</span></h3>
          <div class="btn-list">
            <button id="enter-btn" class="btn" onclick="enterRoom()">
              <span class="btn-text" data-i18n="common.enterRoom">Enter Room</span>
            </button>
            <button id="exit-btn" class="btn" onclick="exitRoom()" disabled>
              <span class="btn-text" data-i18n="common.exitRoom">Exit Room</span>
            </button>
          </div>
        </section>
        <section>
          <h3><span class="step-badge">3</span><span data-i18n="watermark.startWatermarkPlugin">Start watermark plugin</span></h3>
          <div class="option-container">
            <div class="option-item">
              <label for="size" data-i18n="watermark.size">Size:</label>
              <select id="size">
                <option value="cover" selected>cover (default)</option>
                <option value="contain">contain</option>
              </select>
            </div>
            <div class="option-item">
              <label for="image-url" data-i18n="watermark.watermarkUrl">Watermark URL:</label>
              <input
                type="text"
                id="image-url"
                class="url-input"
                value="https://web.sdk.qcloud.com/trtc/webrtc/test/qer-test/watermark/tv2.png"
              />
            </div>
          </div>
          <div class="btn-list">
            <button
              id="start-watermark-btn"
              class="btn"
              onclick="startWatermark()"
              disabled
            >
              <span class="btn-text" data-i18n="watermark.startWatermark">Start Watermark</span>
            </button>
            <button
              id="stop-watermark-btn"
              class="btn"
              onclick="stopWatermark()"
              disabled
            >
              <span class="btn-text" data-i18n="watermark.stopWatermark">Stop Watermark</span>
            </button>
          </div>
        </section>
        <invite-section id="invite-section-el"></invite-section>
      </div>
      <video-views></video-views>
    </main>
  </body>
</html>
