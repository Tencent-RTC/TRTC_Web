<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <title>Media Device</title>
    <script src="../../util/i18n.js" defer></script>
    <script src="../../components/header.js" defer></script>
    <script src="../../components/params-form.js" defer></script>
    <script src="../../components/invite-section.js" defer></script>
    <script src="../../components/video-views.js" defer></script>
    <script
      src="https://cdn-go.cn/aegis/aegis-sdk/latest/aegis.min.js"
      defer
    ></script>
    <script src="../../libs/lib-generate-test-usersig.min.js" defer></script>
    <script
      src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"
      defer
    ></script>
    <script src="../../libs/clipboard.min.js" defer></script>
    <script src="../../util/utils.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header-nav></header-nav>
    <main>
      <div class="feature-container">
        <h1 style="color: #1c66e5" data-i18n="mediaDevice.title">Media Device</h1>
        <params-form></params-form>
        <section>
          <h3><span class="step-badge">2</span><span data-i18n="common.enterTheRoom">Enter the room</span></h3>
          <div class="btn-list">
            <button id="enter-btn" class="btn" onclick="enterRoom()">
              <span class="btn-text" data-i18n="common.enterRoom">Enter Room</span>
            </button>
            <button id="exit-btn" class="btn" onclick="exitRoom()" disabled>
              <span class="btn-text" data-i18n="common.exitRoom">Exit Room</span>
            </button>
          </div>
        </section>
        <section>
          <h3>
            <span class="step-badge">3</span><span data-i18n="mediaDevice.differentOptions">Different options to turn on/off the microphone and camera</span>
          </h3>
          <div>
            <label data-i18n="mediaDevice.options">Options:</label>
            <select id="option">
              <option value="mute" selected data-i18n="mediaDevice.useMute">
                Use the mute parameter (recommended)
              </option>
              <option value="publish" data-i18n="mediaDevice.usePublish">Use the publish parameter</option>
              <option value="stop" data-i18n="mediaDevice.useStop">
                Use stopLocalVideo() & stopLocalAudio()
              </option>
            </select>
          </div>
          <div class="btn-list first-btn-list">
            <button
              id="start-audio-btn"
              class="btn"
              onclick="startLocalAudio()"
            >
              <span class="btn-text" data-i18n="common.startLocalAudio">Start Local Audio</span>
            </button>
            <button
              id="stop-audio-btn"
              class="btn"
              onclick="stopLocalAudio()"
              disabled
            >
              <span class="btn-text" data-i18n="common.stopLocalAudio">Stop Local Audio</span>
            </button>
            <button id="mute-mic-btn" class="btn mute-btn" disabled>
              <span class="btn-text" data-i18n="mediaDevice.muteMicrophone">Mute Microphone</span>
            </button>
            <button
              id="publish-mic-btn"
              class="btn publish-btn"
              disabled
              style="display: none"
            >
              <span class="btn-text" data-i18n="mediaDevice.publishMicrophone">Publish Microphone</span>
            </button>
            <button id="unmute-mic-btn" class="btn mute-btn" disabled>
              <span class="btn-text" data-i18n="mediaDevice.unmuteMicrophone">Unmute Microphone</span>
            </button>
            <button
              id="unpublish-mic-btn"
              class="btn publish-btn"
              disabled
              style="display: none"
            >
              <span class="btn-text" data-i18n="mediaDevice.unpublishMicrophone">Unpublish Microphone</span>
            </button>
          </div>
          <div class="btn-list">
            <button
              id="start-video-btn"
              class="btn"
              onclick="startLocalVideo()"
            >
              <span class="btn-text" data-i18n="common.startLocalVideo">Start Local Video</span>
            </button>
            <button
              id="stop-video-btn"
              class="btn"
              onclick="stopLocalVideo()"
              disabled
            >
              <span class="btn-text" data-i18n="common.stopLocalVideo">Stop Local Video</span>
            </button>
            <button id="mute-camera-btn" class="btn mute-btn" disabled>
              <span class="btn-text" data-i18n="mediaDevice.muteCamera">Mute Camera</span>
            </button>
            <button
              id="publish-camera-btn"
              class="btn publish-btn"
              disabled
              style="display: none"
            >
              <span class="btn-text" data-i18n="mediaDevice.publishCamera">Publish Camera</span>
            </button>
            <button id="unmute-camera-btn" class="btn mute-btn" disabled>
              <span class="btn-text" data-i18n="mediaDevice.unmuteCamera">Unmute Camera</span>
            </button>
            <button
              id="unpublish-camera-btn"
              class="btn publish-btn"
              disabled
              style="display: none"
            >
              <span class="btn-text" data-i18n="mediaDevice.unpublishCamera">Unpublish Camera</span>
            </button>
          </div>
        </section>
        <section>
          <h3><span class="step-badge">3</span><span data-i18n="mediaDevice.switchDevices">Switch the microphone, camera and speaker</span></h3>
          <div class="device-container">
            <div class="device-item">
              <label for="microphone-select" data-i18n="mediaDevice.microphones">Microphones:</label>
              <select id="microphone-select"></select>
              <button
                id="update-mic-btn"
                class="btn"
                style="display: block"
                disabled
              >
                <span class="btn-text" data-i18n="mediaDevice.updateMicrophone">Update Microphone</span>
              </button>
            </div>
            <div class="device-item">
              <label for="camera-select" data-i18n="mediaDevice.cameras">Cameras:</label>
              <select id="camera-select"></select>
              <button
                id="update-camera-btn"
                class="btn"
                style="display: block"
                disabled
              >
                <span class="btn-text" data-i18n="mediaDevice.updateCamera">Update Camera</span>
              </button>
            </div>
            <div class="device-item">
              <label for="speaker-select" data-i18n="mediaDevice.speakers">Speakers:</label>
              <select id="speaker-select"></select>
              <button
                id="update-speaker-btn"
                class="btn"
                style="display: block"
                disabled
              >
                <span class="btn-text" data-i18n="mediaDevice.updateSpeaker">Update Speaker</span>
              </button>
            </div>
          </div>
        </section>
        <invite-section></invite-section>
      </div>
      <video-views></video-views>
    </main>
  </body>
</html>
