<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <title>Audio Volume</title>
    <script src="../../util/i18n.js" defer></script>
    <script src="../../components/header.js" defer></script>
    <script src="../../components/params-form.js" defer></script>
    <script src="../../components/invite-section.js" defer></script>
    <script
      src="https://cdn-go.cn/aegis/aegis-sdk/latest/aegis.min.js"
      defer
    ></script>
    <script src="../../libs/lib-generate-test-usersig.min.js" defer></script>
    <script
      src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"
      defer
    ></script>
    <script src="../../libs/clipboard.min.js" defer></script>
    <script src="../../util/utils.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header-nav></header-nav>
    <main>
      <div class="feature-container">
        <h1 style="color: #1c66e5" data-i18n="audioVolume.title">Audio Volume</h1>
        <params-form></params-form>
        <section>
          <h3><span class="step-badge">2</span><span data-i18n="common.enterTheRoom">Enter the room</span></h3>
          <div class="btn-list">
            <button id="enter-btn" class="btn" onclick="enterRoom()">
              <span class="btn-text" data-i18n="common.enterRoom">Enter Room</span>
            </button>
            <button id="exit-btn" class="btn" onclick="exitRoom()" disabled>
              <span class="btn-text" data-i18n="common.exitRoom">Exit Room</span>
            </button>
          </div>
        </section>
        <section>
          <h3><span class="step-badge">3</span><span data-i18n="audioVolume.detectAudioVolume">Detect audio volume</span></h3>
          <span class="note" data-i18n="audioVolume.speakingAfterMuting">Speaking after muting can still be detected</span>
          <div>
            <div class="volume-detect">
              <label for="local-volume-detect" data-i18n="audioVolume.localVolume">Local volume:</label>
              <input
                id="local-volume-detect"
                class="volume-display"
                type="text"
                readonly
              />
            </div>
            <div class="volume-detect">
              <label for="remote-volume-detect" data-i18n="audioVolume.remoteVolume">Remote volume:</label>
              <input
                id="remote-volume-detect"
                class="volume-display"
                type="text"
                readonly
              />
            </div>
          </div>
          <div class="option-container">
            <div class="option-item">
              <input type="checkbox" id="enable-background" />
              <label for="enable-background" style="white-space: nowrap"
                data-i18n="audioVolume.enableInBackground">Enable in background</label
              >
            </div>
            <div class="option-item">
              <label for="detect-interval" data-i18n="audioVolume.detectInterval">Detect interval:</label>
              <select id="detect-interval">
                <option value="500">500ms</option>
                <option value="1000">1000ms</option>
                <option value="2000" selected>2000ms (default)</option>
              </select>
            </div>
          </div>
          <div class="btn-list">
            <button
              id="start-detect-btn"
              class="btn"
              onclick="startAudioVolumeDetection()"
              disabled
            >
              <span class="btn-text" data-i18n="audioVolume.startDetection">Start Detection</span>
            </button>
            <button
              id="stop-detect-btn"
              class="btn"
              onclick="stopAudioVolumeDetection()"
              disabled
            >
              <span class="btn-text" data-i18n="audioVolume.stopDetection">Stop Detection</span>
            </button>
          </div>
        </section>
        <section>
          <h3><span class="step-badge">3</span><span data-i18n="audioVolume.adjustAudioVolume">Adjust audio volume</span></h3>
          <div class="volume-adjust">
            <div class="volume-adjust-display">
              <label for="local-volume-display" data-i18n="audioVolume.localVolume">Local volume:</label>
              <input
                id="local-volume-display"
                class="volume-display"
                type="text"
                value="100"
                readonly
              />
            </div>
            <input
              type="range"
              id="local-volume-input"
              class="volume-input"
              onchange="handleLocalAudioVolumeChange()"
              min="0"
              max="200"
              disabled
            />
            <div class="btn-list">
              <button
                id="mute-btn"
                class="btn"
                onclick="muteLocalAudio()"
                disabled
              >
                <span class="btn-text" data-i18n="audioVolume.muteLocalAudio">Mute Local Audio</span>
              </button>
              <button
                id="unmute-btn"
                class="btn"
                onclick="muteLocalAudio()"
                disabled
              >
                <span class="btn-text" data-i18n="audioVolume.unmuteLocalAudio">Unmute Local Audio</span>
              </button>
            </div>
          </div>
          <div class="volume-adjust">
            <div class="volume-adjust-display">
              <label for="remote-volume-display" data-i18n="audioVolume.remoteVolume">Remote volume:</label>
              <input
                id="remote-volume-display"
                class="volume-display"
                type="text"
                value="100"
                readonly
              />
            </div>
            <input
              type="range"
              id="remote-volume-input"
              class="volume-input"
              onchange="handleRemoteAudioVolumeChange()"
              min="0"
              max="200"
              disabled
            />
          </div>
        </section>
        <invite-section></invite-section>
      </div>
    </main>
  </body>
</html>
