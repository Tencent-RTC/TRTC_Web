<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen Sharing</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <script src="../../util/i18n.js" defer></script>
    <script src="../../components/header.js" defer></script>
    <script src="../../components/params-form.js" defer></script>
    <script src="../../components/invite-section.js" defer></script>
    <script src="../../components/video-views.js" defer></script>
    <script
      src="https://cdn-go.cn/aegis/aegis-sdk/latest/aegis.min.js"
      defer
    ></script>
    <script src="../../libs/lib-generate-test-usersig.min.js" defer></script>
    <script
      src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"
      defer
    ></script>
    <script src="../../libs/clipboard.min.js" defer></script>
    <script src="../../util/utils.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header-nav></header-nav>
    <main>
      <div class="feature-container">
        <h1 style="color: #1c66e5" data-i18n="screenSharing.title">Screen Sharing</h1>
        <params-form></params-form>
        <section>
          <h3><span class="step-badge">2</span><span data-i18n="common.enterTheRoom">Enter the room</span></h3>
          <div class="btn-list">
            <button id="enter-btn" class="btn" onclick="enterRoom()">
              <span class="btn-text" data-i18n="common.enterRoom">Enter Room</span>
            </button>
            <button id="exit-btn" class="btn" onclick="exitRoom()" disabled>
              <span class="btn-text" data-i18n="common.exitRoom">Exit Room</span>
            </button>
          </div>
        </section>
        <section>
          <h3><span class="step-badge">3</span><span data-i18n="screenSharing.startScreenSharing">Start screen sharing</span></h3>
          <span id="iframe-note" class="note" style="display: none"
            data-i18n="screenSharing.iframeNote">You are running demo inside iframe. Therefore, capture HTMLElement
            is not supported.
          </span>
          <div class="option-container">
            <div class="option-item">
              <input type="checkbox" id="system-audio" checked />
              <label for="system-audio" data-i18n="screenSharing.useSystemAudio">Use System Audio</label>
            </div>
            <div class="option-item">
              <label for="profile" data-i18n="screenSharing.screenProfile">Screen Profile:</label>
              <select id="profile">
                <option value="480p">480p</option>
                <option value="480p_2">480p_2</option>
                <option value="720p">720p</option>
                <option value="720p_2">720p_2</option>
                <option value="1080p" selected>1080p (default)</option>
                <option value="1080p_2">1080p_2</option>
              </select>
            </div>
            <div class="option-item">
              <label for="capture-element" data-i18n="screenSharing.captureElement">Capture HTMLElement:</label>
              <select id="capture-element">
                <option value="enter-btn">HTML button</option>
                <option value="" selected>None</option>
              </select>
            </div>
            <div class="option-item">
              <label for="display-surface" data-i18n="screenSharing.displaySurface">Display Surface:</label>
              <select id="display-surface">
                <option value="current-tab">current-tab</option>
                <option value="tab">tab</option>
                <option value="window">window</option>
                <option value="monitor" selected>monitor (default)</option>
              </select>
            </div>
          </div>
          <div class="btn-list">
            <button id="start-share-btn" class="btn" onclick="startShare()">
              <span class="btn-text" data-i18n="quickStart.startScreenShare">Start Screen Share</span>
            </button>
            <button
              id="stop-share-btn"
              class="btn"
              onclick="stopShare()"
              disabled
            >
              <span class="btn-text" data-i18n="quickStart.stopScreenShare">Stop Screen Share</span>
            </button>
          </div>
        </section>
        <invite-section id="invite-section-el"></invite-section>
      </div>
      <video-views local-title="Local Screen" remote-title="Remote Screen" local-id="local-screen-view" remote-id="remote-screen-view"></video-views>
    </main>
  </body>
</html>
