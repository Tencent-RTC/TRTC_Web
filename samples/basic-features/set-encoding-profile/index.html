<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <title>Set Encoding Profile</title>
    <script src="../../util/i18n.js" defer></script>
    <script src="../../components/header.js" defer></script>
    <script src="../../components/params-form.js" defer></script>
    <script src="../../components/invite-section.js" defer></script>
    <script src="../../components/video-views.js" defer></script>
    <script
      src="https://cdn-go.cn/aegis/aegis-sdk/latest/aegis.min.js"
      defer
    ></script>
    <script src="../../libs/lib-generate-test-usersig.min.js" defer></script>
    <script
      src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"
      defer
    ></script>
    <script src="../../libs/clipboard.min.js" defer></script>
    <script src="../../util/utils.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header-nav></header-nav>
    <main>
      <div class="feature-container">
        <h1 style="color: #1c66e5" data-i18n="encodingProfile.title">Set Encoding Profile</h1>
        <params-form></params-form>
        <section>
          <h3 class="step-title"><span class="step-badge">2</span><span data-i18n="common.enterTheRoom">Enter the room</span></h3>
          <div class="btn-list">
            <button id="enter-btn" class="btn" onclick="enterRoom()">
              <span class="btn-text" data-i18n="common.enterRoom">Enter Room</span>
            </button>
            <button id="exit-btn" class="btn" onclick="exitRoom()" disabled>
              <span class="btn-text" data-i18n="common.exitRoom">Exit Room</span>
            </button>
          </div>
        </section>
        <section>
          <h3><span class="step-badge">3</span><span data-i18n="encodingProfile.chooseProfile">Choose encoding profile</span></h3>
          <span style="color: #084298; font-family: 'Oxygen'"
            data-i18n="encodingProfile.audioNote">Note: SDK does not support dynamic adjustment of audio profile
            during the call.</span
          >
          <div class="option-container">
            <div class="option-item">
              <label data-i18n="encodingProfile.videoProfile">Video profile:</label>
              <select id="video-profile">
                <option value="120p">120p</option>
                <option value="120p_2">120p_2</option>
                <option value="180p">180p</option>
                <option value="180p_2">180p_2</option>
                <option value="240p">240p</option>
                <option value="240p_2">240p_2</option>
                <option value="360p">360p</option>
                <option value="360p_2">360p_2</option>
                <option value="480p">480p</option>
                <option value="480p_2" selected>480p_2 (default)</option>
                <option value="720p">720p</option>
                <option value="1080p">1080p</option>
                <option value="1440p">1440p</option>
                <option value="4K">4K</option>
              </select>
              <button
                id="update-video-btn"
                class="btn"
                onclick="updateVideoProfile()"
                disabled
              >
                <span class="btn-text" data-i18n="encodingProfile.update">Update</span>
              </button>
            </div>
            <div class="option-item">
              <label data-i18n="encodingProfile.audioProfile">Audio profile:</label>
              <select id="audio-profile">
                <option value="standard" selected>Standard (default)</option>
                <option value="high">High</option>
                <option value="standard-stereo">Standard Stereo</option>
                <option value="high-stereo">High Stereo</option>
              </select>
            </div>
          </div>
          <div class="btn-list">
            <button
              id="start-audio-btn"
              class="btn"
              onclick="startLocalAudio()"
            >
              <span class="btn-text" data-i18n="common.startLocalAudio">Start Local Audio</span>
            </button>
            <button
              id="stop-audio-btn"
              class="btn"
              onclick="stopLocalAudio()"
              disabled
            >
              <span class="btn-text" data-i18n="common.stopLocalAudio">Stop Local Audio</span>
            </button>
          </div>
          <div class="btn-list">
            <button
              id="start-video-btn"
              class="btn"
              onclick="startLocalVideo()"
            >
              <span class="btn-text" data-i18n="common.startLocalVideo">Start Local Video</span>
            </button>
            <button
              id="stop-video-btn"
              class="btn"
              onclick="stopLocalVideo()"
              disabled
            >
              <span class="btn-text" data-i18n="common.stopLocalVideo">Stop Local Video</span>
            </button>
          </div>
        </section>
        <invite-section></invite-section>
      </div>
      <video-views></video-views>
    </main>
  </body>
</html>
