<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <title>Live Streaming</title>
    <script src="../../util/i18n.js" defer></script>
    <script src="../../components/header.js" defer></script>
    <script src="../../components/params-form.js" defer></script>
    <script src="../../components/invite-section.js" defer></script>
    <script src="../../components/video-views.js" defer></script>
    <script
      src="https://cdn-go.cn/aegis/aegis-sdk/latest/aegis.min.js"
      defer
    ></script>
    <script src="../../libs/lib-generate-test-usersig.min.js" defer></script>
    <script
      src="https://web.sdk.qcloud.com/trtc/webrtc/v5/dist/trtc.js"
      defer
    ></script>
    <script src="../../libs/clipboard.min.js" defer></script>
    <script src="../../util/utils.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header-nav></header-nav>
    <main>
      <div class="feature-container">
        <h1 style="color: #1c66e5" data-i18n="liveStreaming.title">Live Streaming</h1>
        <params-form></params-form>
        <section>
          <h3 id="enter-room-title"><span class="step-badge">2</span><span data-i18n="liveStreaming.enterAsAnchor">Enter the room as anchor</span></h3>
          <div class="btn-list">
            <button id="enter-btn" class="btn" onclick="enterRoom()">
              <span class="btn-text" data-i18n="common.enterRoom">Enter Room</span>
            </button>
            <button id="exit-btn" class="btn" onclick="exitRoom()" disabled>
              <span class="btn-text" data-i18n="common.exitRoom">Exit Room</span>
            </button>
          </div>
        </section>
        <invite-section id="invite-container"></invite-section>
        <section id="role-switch-container">
          <h3><span class="step-badge">3</span><span data-i18n="liveStreaming.switchRoles">Switch roles</span></h3>
          <div class="role-switch-content">
            <div class="role-content">
              <label id="role-label" for="role" data-i18n="liveStreaming.audience">Audience</label>
              <label class="switch">
                <input
                  id="role"
                  type="checkbox"
                  onchange="switchRole()"
                  disabled
                />
                <span class="slider round"></span>
              </label>
            </div>
            <div>
              <div
                class="device"
                id="microphone"
                onclick="switchMicrophoneStatus()"
              >
                <img
                  id="mic-icon"
                  class="device-icon"
                  src="https://web.sdk.qcloud.com/trtc/webrtc/v5/demo/samples/icons/mic-off.svg"
                  alt="Microphone off"
                />
              </div>
              <div class="device" id="video" onclick="switchCameraStatus()">
                <img
                  id="video-icon"
                  class="device-icon"
                  src="https://web.sdk.qcloud.com/trtc/webrtc/v5/demo/samples/icons/video-off.svg"
                  alt="Video off"
                />
              </div>
            </div>
          </div>
        </section>
      </div>
      <video-views></video-views>
    </main>
  </body>
</html>
